<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Codex Proxy Status</title>
<link rel="icon" href="/static/icons/favicon.ico" sizes="any">
<link rel="icon" href="/static/icons/icon-192.png" type="image/png" sizes="192x192">
<link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
<link rel="manifest" href="/static/site.webmanifest">
<style>
:root{color-scheme:light dark;--bg:#f7f7f3;--panel:#ffffff;--text:#202124;--muted:#6b6f76;--line:#deded8;--green:#16794c;--amber:#9a6200;--red:#b3261e;--blue:#0b57d0}
@media (prefers-color-scheme:dark){:root{--bg:#171816;--panel:#20211f;--text:#f2f2ee;--muted:#a6aaa3;--line:#353733;--green:#73d19a;--amber:#e5b454;--red:#ff8a80;--blue:#8ab4f8}}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
main{max-width:1120px;margin:0 auto;padding:28px 18px 40px}
header{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;margin-bottom:18px}
h1{font-size:26px;margin:0 0 6px}
h2{font-size:16px;margin:0 0 12px}
p{margin:0;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin:16px 0}
.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px}
.num{font-size:26px;font-weight:700;margin-bottom:2px}
.label{color:var(--muted);font-size:12px}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;border-bottom:1px solid var(--line);padding:9px 8px;vertical-align:top}
th{font-size:12px;color:var(--muted);font-weight:600}
code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px}
.ok{color:var(--green)}.warn{color:var(--amber)}.bad{color:var(--red)}.muted{color:var(--muted)}
.pill{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:2px 8px;font-size:12px}
.bar{width:88px;height:6px;background:var(--line);border-radius:999px;overflow:hidden;margin:4px 0}
.fill{height:100%;border-radius:999px;background:var(--green)}
.fill.warn{background:var(--amber)}.fill.bad{background:var(--red)}
.sub{display:block;color:var(--muted);font-size:12px;margin-top:2px}
.toolbar{display:flex;gap:8px;align-items:center}
.token-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px}
.usage-charts{display:grid;grid-template-columns:minmax(280px,1fr) minmax(320px,1.35fr);gap:18px;align-items:start}
.chart-header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
.chart-title{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px}
.chart-header .chart-title{margin-bottom:0}
.usage-mode{display:flex;gap:4px}
.usage-mode button{padding:4px 8px;font-size:12px}
.usage-mode button.active{border-color:var(--blue);color:var(--blue)}
.bar-chart{height:150px;display:grid;grid-template-columns:repeat(31,minmax(4px,1fr));gap:3px;align-items:end;border-bottom:1px solid var(--line);padding-top:8px}
.usage-bar{position:relative;min-height:3px;border-radius:4px 4px 0 0;background:var(--blue);opacity:.85;outline:0}
.usage-bar:hover,.usage-bar:focus{opacity:1;box-shadow:0 0 0 2px color-mix(in srgb,var(--blue) 35%,transparent)}
.heatmap-wrap{overflow-x:auto;padding-bottom:2px}
.heatmap{display:grid;grid-auto-flow:column;grid-template-rows:repeat(7,12px);grid-auto-columns:12px;gap:3px;width:max-content}
.heat-cell{position:relative;width:12px;height:12px;border-radius:3px;background:var(--line);outline:0}
.heat-cell[data-level="1"]{background:color-mix(in srgb,var(--green) 28%,var(--panel))}
.heat-cell[data-level="2"]{background:color-mix(in srgb,var(--green) 48%,var(--panel))}
.heat-cell[data-level="3"]{background:color-mix(in srgb,var(--green) 68%,var(--panel))}
.heat-cell[data-level="4"]{background:var(--green)}
.heat-cell:hover,.heat-cell:focus{box-shadow:0 0 0 2px var(--blue);z-index:2}
.tooltip-source{position:relative}
.tooltip-source:hover::after,.tooltip-source:focus::after{content:attr(data-tip);position:absolute;left:50%;bottom:calc(100% + 8px);transform:translateX(-50%);z-index:10;width:max-content;max-width:240px;white-space:pre-line;background:var(--text);color:var(--bg);border-radius:6px;padding:7px 9px;font-size:12px;line-height:1.35;box-shadow:0 8px 24px rgba(0,0,0,.24);pointer-events:none}
.quota-donuts{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.donut-item{display:flex;align-items:center;gap:7px;min-width:92px}
.donut{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--ring) calc(var(--value)*1%),var(--line) 0);position:relative;flex:0 0 auto}
.donut::after{content:"";position:absolute;inset:6px;border-radius:50%;background:var(--panel)}
.donut span{position:relative;z-index:1;font-size:11px;font-weight:700;color:var(--text)}
.donut.ok{--ring:var(--green)}.donut.warn{--ring:var(--amber)}.donut.bad{--ring:var(--red)}.donut.empty{--ring:var(--line)}
.donut-label{font-size:12px;font-weight:700}.donut-note{display:block;color:var(--muted);font-size:11px;line-height:1.2}
button{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:6px;padding:8px 11px;cursor:pointer}
button:hover{border-color:var(--blue)}
@media(max-width:900px){.usage-charts{grid-template-columns:1fr}}
@media(max-width:760px){header{display:block}.grid,.token-grid{grid-template-columns:repeat(2,minmax(0,1fr))}table{font-size:12px}.quota-donuts{min-width:210px}}
</style>
</head>
<body>
<main>
  <header>
    <div>
      <h1>Codex Proxy Status</h1>
      <p>Web只做状态诊断。账号、服务和 Codex 配置请用本地小腊肠 App 管理。</p>
    </div>
    <div class="toolbar">
      <button id="refresh-button" onclick="refreshQuota()">刷新</button>
      <span id="refresh-status" class="sub">自动刷新中</span>
    </div>
  </header>

  <section class="grid">
    <div class="card"><div class="num" id="running">-</div><div class="label">代理状态</div></div>
    <div class="card"><div class="num" id="accounts">-</div><div class="label">可用账号 / 总账号</div></div>
    <div class="card"><div class="num" id="strategy">-</div><div class="label">选择策略</div></div>
    <div class="card"><div class="num" id="requests">-</div><div class="label">总请求</div></div>
    <div class="card"><div class="num" id="stream-mode">-</div><div class="label">Codex 流模式</div></div>
    <div class="card"><div class="num" id="keepalive">-</div><div class="label">SSE 保活 / 首字节重试</div></div>
    <div class="card"><div class="num" id="ws-heartbeat">-</div><div class="label">WebSocket 心跳</div></div>
    <div class="card"><div class="num" id="affinity">-</div><div class="label">会话绑定</div></div>
    <div class="card"><div class="num" id="remote-mode">-</div><div class="label">远程兼容</div></div>
    <div class="card"><div class="num" id="remote-account">-</div><div class="label">远程主账号</div></div>
  </section>

  <section class="card">
    <h2>账号状态</h2>
    <div id="account-list" class="muted">加载中...</div>
  </section>

  <section class="card" style="margin-top:12px">
    <h2>Token 历史消耗</h2>
    <div id="token-usage" class="muted">加载中...</div>
  </section>

  <section class="card" style="margin-top:12px">
    <h2>最近请求</h2>
    <div id="recent" class="muted">加载中...</div>
  </section>

  <section class="card" style="margin-top:12px">
    <h2>最近错误</h2>
    <div id="errors" class="muted">加载中...</div>
  </section>
</main>

<script>
let tokenUsageHeatmapMode = 'daily';
let latestTokenUsage = null;

async function fetchJSON(path, options = {}) {
  const response = await fetch(path, { cache: 'no-store', ...options });
  const text = await response.text();
  try { return JSON.parse(text); } catch { return { error: text || response.statusText }; }
}

async function refreshAll() {
  const [status, accounts, quota, tokenUsage] = await Promise.all([
    fetchJSON('/api/status'),
    fetchJSON('/api/accounts'),
    fetchJSON('/api/quota'),
    fetchJSON('/api/token-usage?daily_days=371'),
  ]);
  renderStatus(status);
  renderAccounts(Array.isArray(accounts) ? accounts : [], quota && !quota.error ? quota : {});
  renderTokenUsage(tokenUsage);
}

async function refreshQuota() {
  const button = document.getElementById('refresh-button');
  const status = document.getElementById('refresh-status');
  button.disabled = true;
  button.textContent = '刷新中...';
  status.textContent = '正在拉取最新额度...';
  try {
    const result = await fetchJSON('/api/quota/refresh', { method: 'POST' });
    await refreshAll();
    const refreshed = Object.values(result.accounts || {}).filter(item => item.refreshed).length;
    status.textContent = refreshed ? `已刷新 ${refreshed} 个账号：${new Date().toLocaleTimeString()}` : '刷新完成，但没有新数据';
  } finally {
    button.disabled = false;
    button.textContent = '刷新';
  }
}

function renderStatus(status) {
  document.getElementById('running').textContent = status && !status.error ? '在线' : '异常';
  document.getElementById('running').className = status && !status.error ? 'num ok' : 'num bad';
  document.getElementById('accounts').textContent = `${status.active_accounts ?? '-'} / ${status.total_accounts ?? '-'}`;
  document.getElementById('strategy').textContent = status.strategy || '-';
  document.getElementById('requests').textContent = status.stats?.total_requests ?? '-';
  document.getElementById('stream-mode').textContent = status.config?.codex_stream_mode || status.codex_stream_mode || '-';
  document.getElementById('keepalive').textContent = `${status.config?.stream_keepalive_seconds ?? '-'}s / ${status.config?.stream_bootstrap_retries ?? '-'}`;
  document.getElementById('ws-heartbeat').textContent = status.config?.websocket_heartbeat_seconds ? `${status.config.websocket_heartbeat_seconds}s` : '关闭';
  document.getElementById('affinity').textContent = status.config?.session_affinity_enabled ? `开 ${status.config?.session_affinity_size ?? 0}` : '关';
  document.getElementById('remote-mode').textContent = status.remote_proxy_mode === 'fixed_account' ? '固定账号' : (status.remote_proxy_mode || '-');
  document.getElementById('remote-account').textContent = status.remote_account_selected || status.remote_account || '-';
  document.getElementById('remote-account').className = status.remote_account_available ? 'num ok' : 'num bad';
  document.getElementById('stream-mode').className = rowsHasBuffered(status.recent_requests || []) ? 'num warn' : 'num ok';

  const rows = (status.recent_requests || []).slice(0, 12);
  if (!rows.length) {
    document.getElementById('recent').innerHTML = '<p>暂无请求记录。</p>';
  } else {
    document.getElementById('recent').innerHTML = `<table><thead><tr><th>时间</th><th>账号</th><th>路由</th><th>状态</th><th>传输</th><th>流</th><th>首字节</th><th>保活</th><th>会话</th><th>路径</th><th>ID</th></tr></thead><tbody>${
      rows.map(row => `<tr>
        <td>${esc(row.at ? new Date(row.at * 1000).toLocaleTimeString() : '-')}</td>
        <td>${esc(row.account || '-')}</td>
        <td>${esc(routeLabel(row.route_class))}</td>
        <td>${statusLabel(row.status)}</td>
        <td>${esc(row.transport || '-')}</td>
        <td class="${row.stream_mode === 'hybrid-buffered' ? 'warn' : ''}">${esc(row.stream_mode || '-')}</td>
        <td>${row.first_byte_ms == null ? '-' : `${esc(row.first_byte_ms)}ms`}</td>
        <td>${row.stream_keepalive_count ?? '-'}</td>
        <td>${row.session_key ? `${esc(row.session_key)}${row.affinity_hit ? ' 命中' : ''}` : '-'}</td>
        <td><code>${esc(row.path || '-')}</code></td>
        <td><code>${esc(row.request_id || '-')}</code></td>
      </tr>`).join('')
    }</tbody></table>`;
  }

  const errors = (status.recent_errors || []).slice(0, 8);
  if (!errors.length) {
    document.getElementById('errors').innerHTML = '<p>暂无上游或流式错误。</p>';
    return;
  }
  document.getElementById('errors').innerHTML = `<table><thead><tr><th>时间</th><th>账号</th><th>路径</th><th>错误</th><th>ID</th></tr></thead><tbody>${
    errors.map(row => `<tr>
      <td>${esc(row.at ? new Date(row.at * 1000).toLocaleTimeString() : '-')}</td>
      <td>${esc(row.account || '-')}</td>
      <td><code>${esc(row.path || '-')}</code></td>
      <td>${esc(row.error || '-')}</td>
      <td><code>${esc(row.request_id || '-')}</code></td>
    </tr>`).join('')
  }</tbody></table>`;
}

function renderAccounts(accounts, quota) {
  if (!accounts.length) {
    document.getElementById('account-list').innerHTML = '<p>未发现账号。请用本地 App 生成登录命令或导入当前账号。</p>';
    return;
  }
  document.getElementById('account-list').innerHTML = `<table><thead><tr><th>名称</th><th>Email</th><th>状态</th><th>额度</th><th>刷新时间</th><th>Token</th></tr></thead><tbody>${
    accounts.map(account => {
      const q = quota?.[account.name] || null;
      const summary = quotaSummary(q);
      return `<tr>
      <td><strong>${esc(account.name || '-')}</strong></td>
      <td>${esc(account.email || '-')}</td>
      <td>${accountState(account)}</td>
      <td>${quotaDonuts(summary)}</td>
      <td>${refreshCell(summary)}</td>
      <td>${account.expires_at ? esc(new Date(account.expires_at * 1000).toLocaleString()) : '-'}</td>
    </tr>`;
    }).join('')
  }</tbody></table>`;
}

function renderTokenUsage(usage) {
  latestTokenUsage = usage;
  const total = usage?.total || {};
  const daily = Array.isArray(usage?.daily) ? usage.daily : [];
  const weekly = Array.isArray(usage?.weekly) ? usage.weekly : [];
  const today = daily.length ? daily[daily.length - 1] : {};
  const thisWeek = weekly.length ? weekly[weekly.length - 1] : {};
  const updated = usage?.last_recorded_at ? formatTime(usage.last_recorded_at) : '暂无记录';
  const recentDays = daily.slice(-31);
  const maxRecent = Math.max(1, ...recentDays.map(row => Number(row.total_tokens) || 0));
  const maxHeat = Math.max(1, ...daily.map(row => Number(row.total_tokens) || 0));
  const heatRows = tokenUsageHeatmapMode === 'weekly' ? weeklyHeatmapRows(daily) : daily;
  const heatMax = tokenUsageHeatmapMode === 'weekly' ? 7 : maxHeat;
  const heatTitle = tokenUsageHeatmapMode === 'weekly' ? '最近 371 天热力表 · 每周使用天数' : '最近 371 天热力表 · 每日 Token';
  const cards = `
    <div class="token-grid">
      <div><div class="num">${formatTokenCount(today.total_tokens || 0)}</div><div class="label">今日 Token</div></div>
      <div><div class="num">${formatTokenCount(thisWeek.total_tokens || 0)}</div><div class="label">本周 Token</div></div>
      <div><div class="num">${formatTokenCount(total.total_tokens || 0)}</div><div class="label">371天 Token</div></div>
      <div><div class="num">${total.requests || 0}</div><div class="label">请求数 · ${esc(updated)}</div></div>
    </div>`;
  if (!daily.length || !total.requests) {
    document.getElementById('token-usage').innerHTML = `${cards}<p>暂无 token 消耗历史。新的 Codex 请求经过代理后会开始记录。</p>`;
    return;
  }
  document.getElementById('token-usage').innerHTML = `${cards}
    <div class="usage-charts">
      <div>
        <div class="chart-title">最近 31 天柱状图</div>
        <div class="bar-chart">${recentDays.map(row => usageBar(row, maxRecent)).join('')}</div>
      </div>
      <div>
        <div class="chart-header">
          <div class="chart-title">${heatTitle}</div>
          <div class="usage-mode">
            <button type="button" class="${tokenUsageHeatmapMode === 'daily' ? 'active' : ''}" onclick="setTokenUsageHeatmapMode('daily')">每日</button>
            <button type="button" class="${tokenUsageHeatmapMode === 'weekly' ? 'active' : ''}" onclick="setTokenUsageHeatmapMode('weekly')">每周</button>
          </div>
        </div>
        <div class="heatmap-wrap"><div class="heatmap">${heatmapCells(heatRows, heatMax)}</div></div>
      </div>
    </div>`;
}

function setTokenUsageHeatmapMode(mode) {
  if (!['daily', 'weekly'].includes(mode)) return;
  tokenUsageHeatmapMode = mode;
  if (latestTokenUsage) renderTokenUsage(latestTokenUsage);
}

function usageBar(row, maxValue) {
  const total = Number(row.total_tokens) || 0;
  const height = total ? Math.max(3, Math.round((total / maxValue) * 100)) : 3;
  const tip = usageTip(row);
  return `<div class="usage-bar tooltip-source" tabindex="0" data-tip="${esc(tip)}" title="${esc(tip)}" style="height:${height}%"></div>`;
}

function heatmapCells(rows, maxValue) {
  const blanks = rows.length ? new Date(`${rows[0].date}T00:00:00`).getDay() : 0;
  const leading = Array.from({ length: blanks }, () => '<span></span>').join('');
  return leading + rows.map(row => {
    const heatValue = row.heat_value == null ? Number(row.total_tokens) || 0 : Number(row.heat_value) || 0;
    const level = heatValue <= 0 ? 0 : Math.max(1, Math.min(4, Math.ceil((heatValue / maxValue) * 4)));
    const tip = usageTip(row);
    return `<div class="heat-cell tooltip-source" tabindex="0" data-level="${level}" data-tip="${esc(tip)}" title="${esc(tip)}"></div>`;
  }).join('');
}

function weeklyHeatmapRows(daily) {
  const keys = [
    'input_tokens', 'output_tokens', 'reasoning_tokens', 'cached_tokens',
    'cache_tokens', 'cache_read_tokens', 'cache_creation_tokens',
    'cache_tokens_observed_requests', 'reasoning_tokens_observed_requests',
    'total_tokens', 'requests', 'unknown_requests'
  ];
  const blanks = daily.length ? new Date(`${daily[0].date}T00:00:00`).getDay() : 0;
  const totals = new Map();
  daily.forEach((row, index) => {
    const column = Math.floor((blanks + index) / 7);
    if (!totals.has(column)) {
      const total = { week_start: row.date, week_end: row.date, active_days: 0 };
      keys.forEach(key => total[key] = 0);
      totals.set(column, total);
    }
    const total = totals.get(column);
    total.week_end = row.date || total.week_end;
    if ((Number(row.requests) || 0) > 0 || (Number(row.total_tokens) || 0) > 0) {
      total.active_days += 1;
    }
    keys.forEach(key => total[key] += Number(row[key]) || 0);
  });
  return daily.map((row, index) => {
    const column = Math.floor((blanks + index) / 7);
    const total = totals.get(column) || {};
    const label = total.week_end && total.week_end !== total.week_start
      ? `${total.week_start} 至 ${total.week_end}`
      : total.week_start || row.date;
    return {
      ...row,
      ...total,
      date: row.date,
      period_label: label,
      heat_value: Number(total.active_days) || 0,
    };
  });
}

function usageTip(row) {
  const requests = Number(row.requests) || 0;
  const unknown = Number(row.unknown_requests) || 0;
  const known = Math.max(0, requests - unknown);
  const cacheRead = Number(row.cache_read_tokens) || 0;
  const cacheCreate = Number(row.cache_creation_tokens) || 0;
  const cache = (cacheRead || cacheCreate)
    ? cacheRead + cacheCreate
    : Math.max(Number(row.cached_tokens) || 0, Number(row.cache_tokens) || 0);
  const cacheObserved = Boolean(row.cache_tokens_observed) || (Number(row.cache_tokens_observed_requests) || 0) > 0;
  const reasoningObserved = Boolean(row.reasoning_tokens_observed) || (Number(row.reasoning_tokens_observed_requests) || 0) > 0;
  const lines = [
    row.period_label || row.date || row.week_start || '-',
    `总计 ${formatExactTokenCount(row.total_tokens || 0)} tokens`,
    `输入 ${formatExactTokenCount(row.input_tokens || 0)} · 输出 ${formatExactTokenCount(row.output_tokens || 0)}`,
    `缓存 ${cacheObserved ? formatExactTokenCount(cache) : '-'}`,
    `推理 ${reasoningObserved ? formatExactTokenCount(row.reasoning_tokens || 0) : '-'}`,
    `请求 ${requests} · 已知 ${known} · 未知 ${unknown}`
  ];
  if ((Number(row.active_days) || 0) > 0) lines.push(`使用天数 ${Number(row.active_days) || 0} / 7`);
  return lines.join('\n');
}

function quotaSummary(data) {
  if (data?.error) {
    return {
      fiveHour: { value: null, used: null, resetAt: null, note: '刷新中' },
      sevenDay: { value: null, used: null, resetAt: null, note: '刷新中' },
      fetchedAt: null,
      planType: '',
      unavailable: true,
    };
  }
  const rateLimit = data?.rate_limit || {};
  const primary = rateLimit.primary_window || null;
  const secondary = rateLimit.secondary_window || null;
  const fiveHour = quotaWindow(primary, data?.['5h_usage']);
  let sevenDay = quotaWindow(secondary, data?.weekly_usage);
  let sevenDayNote = '';
  if (usesSharedCodexWindow(data, primary, secondary)) {
    sevenDay = quotaWindow(primary, data?.['5h_usage']);
    sevenDayNote = '共享窗口';
  }
  return {
    fiveHour,
    sevenDay: { ...sevenDay, note: sevenDay.note || sevenDayNote },
    fetchedAt: numberOrNull(data?._fetched_at),
    planType: data?.plan_type || '',
  };
}

function usesSharedCodexWindow(data, primary, secondary) {
  const plan = String(data?.plan_type || '').toLowerCase();
  if (!['free', 'go'].includes(plan)) return false;
  return !hasDistinctWeeklyWindow(primary, secondary);
}

function hasDistinctWeeklyWindow(primary, secondary) {
  const secondarySeconds = numberOrNull(secondary?.limit_window_seconds);
  if (secondarySeconds == null || secondarySeconds < 604800 * 0.9) return false;
  const primarySeconds = numberOrNull(primary?.limit_window_seconds);
  return primarySeconds == null || Math.abs(secondarySeconds - primarySeconds) >= 60;
}

function quotaWindow(windowData, fallbackUsed) {
  const used = numberOrNull(windowData?.used_percent ?? fallbackUsed);
  const remaining = used == null ? null : clamp(100 - used, 0, 100);
  return {
    value: remaining,
    used,
    resetAt: numberOrNull(windowData?.reset_at),
    note: '',
  };
}

function quotaCell(item) {
  if (item.value == null) return `<span class="muted">${esc(item.note || '无数据')}</span>`;
  const cls = item.value <= 5 ? 'bad' : item.value <= 25 ? 'warn' : '';
  const used = item.used == null ? '' : `<span class="sub">已用 ${formatPercent(item.used)}</span>`;
  const note = item.note ? `<span class="sub">${esc(item.note)}</span>` : '';
  return `<strong>${formatPercent(item.value)}</strong><div class="bar"><div class="fill ${cls}" style="width:${clamp(item.value, 0, 100)}%"></div></div>${used}${note}`;
}

function quotaDonuts(summary) {
  return `<div class="quota-donuts">${quotaDonut('5h', summary.fiveHour)}${quotaDonut('7d', summary.sevenDay)}</div>`;
}

function quotaDonut(label, item) {
  if (item.value == null) {
    return `<div class="donut-item"><div class="donut empty" style="--value:0"><span>-</span></div><div><span class="donut-label">${esc(label)}</span><span class="donut-note">${esc(item.note || '无数据')}</span></div></div>`;
  }
  const cls = item.value <= 5 ? 'bad' : item.value <= 25 ? 'warn' : 'ok';
  const note = item.note || (item.used == null ? '' : `已用 ${formatPercent(item.used)}`);
  const tip = `${label} 剩余 ${formatPercent(item.value)}${item.used == null ? '' : `\n已用 ${formatPercent(item.used)}`}${item.resetAt ? `\n重置 ${formatTime(item.resetAt)}` : ''}${item.note ? `\n${item.note}` : ''}`;
  return `<div class="donut-item tooltip-source" tabindex="0" data-tip="${esc(tip)}" title="${esc(tip)}"><div class="donut ${cls}" style="--value:${clamp(item.value, 0, 100)}"><span>${formatPercent(item.value)}</span></div><div><span class="donut-label">${esc(label)}</span><span class="donut-note">${esc(note)}</span></div></div>`;
}

function refreshCell(summary) {
  if (summary.unavailable) return '<span class="muted">刷新中</span>';
  const rows = [];
  if (summary.fiveHour.resetAt) rows.push(`5h: ${formatTime(summary.fiveHour.resetAt)}`);
  if (summary.sevenDay.resetAt) rows.push(`7d: ${formatTime(summary.sevenDay.resetAt)}`);
  if (summary.fetchedAt) rows.push(`数据: ${formatTime(summary.fetchedAt)}`);
  return rows.length ? rows.map(row => `<span class="sub">${esc(row)}</span>`).join('') : '<span class="muted">无数据</span>';
}

function statusLabel(code) {
  const value = Number(code);
  const cls = value >= 500 ? 'bad' : value >= 400 ? 'warn' : 'ok';
  return `<span class="${cls}">${esc(code ?? '-')}</span>`;
}

function routeLabel(route) {
  if (route === 'model_pool') return '模型池';
  if (route === 'remote_fixed') return '远程固定';
  if (route === 'backend_fixed') return '后台固定';
  return route || '-';
}

function accountState(account) {
  if (account.auth_error) return `<span class="bad">${esc(account.auth_error)}</span>`;
  if (!account.has_tokens) return '<span class="bad">缺少 token</span>';
  if (!account.enabled) return '<span class="warn">已禁用</span>';
  if (account.rate_limited) return `<span class="warn">${esc(account.cooldown_reason || '冷却中')}</span>`;
  return '<span class="ok">可用</span>';
}

function rowsHasBuffered(rows) {
  return rows.some(row => row.stream_mode === 'hybrid-buffered');
}

function esc(value) {
  return String(value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function numberOrNull(value) {
  const n = Number(value);
  return Number.isFinite(n) ? n : null;
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function formatPercent(value) {
  return `${Math.round(value)}%`;
}

function formatTime(epochSeconds) {
  return new Date(epochSeconds * 1000).toLocaleString();
}

function formatTokenCount(value) {
  const n = Number(value) || 0;
  if (n >= 1000000) return `${(n / 1000000).toFixed(1)}M`;
  if (n >= 1000) return `${(n / 1000).toFixed(1)}K`;
  return String(Math.round(n));
}

function formatExactTokenCount(value) {
  return String(Math.round(Number(value) || 0));
}

refreshAll();
setInterval(refreshAll, 10000);
</script>
</body>
</html>
